apiVersion: v1
kind: Pod
metadata:
  name: trace-iptables-k8s
  namespace: kube-system
spec:
  nodeName: k8s
  hostNetwork: true
  hostPID: true
  containers:
  - name: nsenter
    image: busybox
    command:
    - nsenter
    - "--target"
    - "1"
    - "--mount"
    - "--uts"
    - "--ipc"
    - "--net"
    - "--pid"
    - "--"
    - /bin/sh
    - "-c"
    - |
      echo "=== Can reach pihole pod port 80 ==="
      wget -q -O /dev/null --timeout=5 http://10.244.3.24:80/ 2>&1 && echo "DIRECT_POD_OK" || echo "DIRECT_POD_FAIL"
      echo "=== Can reach pihole via LoadBalancer IP ==="
      wget -q -O /dev/null --timeout=5 http://192.168.1.210:80/ 2>&1 && echo "LB_OK" || echo "LB_FAIL"
      echo "=== DNS test via pihole LB IP ==="
      nslookup google.com 192.168.1.210 2>&1 || true
    securityContext:
      privileged: true
    resources:
      requests:
        cpu: "10m"
        memory: "16Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
  restartPolicy: Never
