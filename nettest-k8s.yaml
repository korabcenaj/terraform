apiVersion: v1
kind: Pod
metadata:
  name: nettest-k8s
  namespace: kube-system
spec:
  nodeName: k8s
  hostNetwork: true
  hostPID: true
  containers:
  - name: test
    image: nicolaka/netshoot
    command:
    - nsenter
    - "--target"
    - "1"
    - "--mount"
    - "--uts"
    - "--ipc"
    - "--net"
    - "--pid"
    - "--"
    - /bin/bash
    - "-c"
    - |
      echo "=== Curl pihole pod directly ==="
      curl -s --max-time 5 http://10.244.3.24:80/ 2>&1 | head -3
      echo ""
      echo "=== Curl pihole via LoadBalancer IP ==="
      curl -s --max-time 5 http://192.168.1.210:80/ 2>&1 | head -3
      echo ""
      echo "=== DNS query via pihole ==="
      dig @192.168.1.210 google.com +short +timeout=3 2>&1
    securityContext:
      privileged: true
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
  restartPolicy: Never
