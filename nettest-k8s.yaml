apiVersion: v1
kind: Pod
metadata:
  name: nettest-k8s
  namespace: kube-system
spec:
  nodeName: k8s
  hostNetwork: true
  hostPID: true
  containers:
  - name: test
    image: nicolaka/netshoot
    command:
    - nsenter
    - "--target"
    - "1"
    - "--mount"
    - "--uts"
    - "--ipc"
    - "--net"
    - "--pid"
    - "--"
    - /bin/bash
    - "-c"
    - |
      echo "=== Node IP and interfaces ==="
      ip -4 addr show enp1s0 | head -5
      echo "=== ARP announce for 192.168.1.210 ==="
      arping -c 3 -A -I enp1s0 192.168.1.210 2>&1
      echo "=== iptables NAT for pihole ==="
      iptables -t nat -S 2>/dev/null | grep 192.168.1.210 | head -5
      echo "=== Curl pihole pod directly ==="
      curl -s --max-time 5 http://10.244.3.24:80/ 2>&1 | head -3
      echo "=== Curl pihole via LB ==="
      curl -s --max-time 5 http://192.168.1.210:80/ 2>&1 | head -3
    securityContext:
      privileged: true
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
  restartPolicy: Never
