apiVersion: v1
kind: Pod
metadata:
  name: fix-firewall-k8s3
  namespace: kube-system
spec:
  nodeName: k8s3
  hostNetwork: true
  hostPID: true
  containers:
  - name: nsenter
    image: busybox
    command:
    - nsenter
    - "--target"
    - "1"
    - "--mount"
    - "--uts"
    - "--ipc"
    - "--net"
    - "--pid"
    - "--"
    - /bin/sh
    - "-c"
    - |
      echo "=== Firewall zones ==="
      firewall-cmd --get-zone-of-interface=flannel.1 2>&1
      firewall-cmd --get-zone-of-interface=cni0 2>&1
      echo "=== Ports ==="
      firewall-cmd --list-ports
      echo "=== Rich rules ==="
      firewall-cmd --list-rich-rules
      echo "=== Trusted zone ==="
      firewall-cmd --zone=trusted --list-all 2>&1
    securityContext:
      privileged: true
    resources:
      requests:
        cpu: "10m"
        memory: "16Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
  restartPolicy: Never
