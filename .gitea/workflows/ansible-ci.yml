name: Ansible CI

on:
  pull_request:
    paths:
      - "ansible/**"
  push:
    branches:
      - main
    paths:
      - "ansible/**"

env:
  ANSIBLE_FORCE_COLOR: true

jobs:
  ansible-lint:
    name: Ansible Lint & Syntax Check
    runs-on: [self-hosted, linux, homelab, kubernetes]
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint

      - name: Install required collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Ansible syntax check
        run: |
          echo "::group::Syntax check — playbooks"
          find playbooks -maxdepth 1 -name "*.yml" -print0 | \
            xargs -0 -I {} ansible-playbook {} --syntax-check
          echo "::endgroup::"

      - name: Ansible Lint
        run: |
          ansible-lint playbooks/ roles/ --profile production --nocolor

      - name: YAML Lint
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 160}, document-start: disable, truthy: disable, braces: {max-spaces-inside: 1}}}" .
