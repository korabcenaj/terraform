name: Build Portfolio Image

on:
  push:
    branches:
      - main
    paths:
      - portfolio-container/**
      - .gitea/workflows/build-portfolio-image.yml
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push
        required: false
        default: latest

jobs:
  build-and-push:
    runs-on:
      - self-hosted
      - linux
      - homelab
      - kubernetes
    env:
      REGISTRY_PORT: 30500
      IMAGE_NAME: portfolio-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        if: ${{ vars.PORTFOLIO_REGISTRY_HOST == '' && secrets.KUBECONFIG_B64 != '' }}
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Write kubeconfig
        if: ${{ vars.PORTFOLIO_REGISTRY_HOST == '' && secrets.KUBECONFIG_B64 != '' }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Resolve registry target
        id: registry
        shell: bash
        run: |
          set -euo pipefail

          registry_host="${{ vars.PORTFOLIO_REGISTRY_HOST }}"
          image_tag="${{ gitea.event.inputs.image_tag || 'latest' }}"

          if [[ -z "${registry_host}" ]]; then
            if [[ ! -f "$HOME/.kube/config" ]]; then
              echo "Set repository variable PORTFOLIO_REGISTRY_HOST or provide KUBECONFIG_B64." >&2
              exit 1
            fi

            registry_host="$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')"
          fi

          if [[ -z "${registry_host}" ]]; then
            echo "Unable to determine a registry host." >&2
            exit 1
          fi

          image_ref="${registry_host}:${REGISTRY_PORT}/${IMAGE_NAME}:${image_tag}"

          echo "registry_host=${registry_host}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Verify registry reachability
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "http://${{ steps.registry.outputs.registry_host }}:${REGISTRY_PORT}/v2/" >/dev/null

      - name: Install Kaniko executor
        run: |
          KANIKO_VERSION="v1.23.2"
          curl -fsSL "https://github.com/GoogleContainerTools/kaniko/releases/download/${KANIKO_VERSION}/executor" -o /tmp/kaniko
          chmod +x /tmp/kaniko
          echo "✅ Kaniko executor installed"

      - name: Kaniko build & push portfolio image
        run: |
          /tmp/kaniko \
            --context=dir://./portfolio-container \
            --dockerfile=./portfolio-container/Dockerfile \
            --destination="${{ steps.registry.outputs.image_ref }}" \
            --cache=true \
            --cache-ttl=24h \
            --snapshot-mode=redo \
            --insecure \
            --verbosity=info
          echo "✅ Image pushed"

      - name: Emit manifest image reference
        run: |
          echo "Push complete. Update the Argo-managed manifest to:"
          echo "image: ${{ steps.registry.outputs.image_ref }}"
