apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: portfolio-web
  namespace: portfolio
  labels:
    app: portfolio-web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: portfolio-web
  template:
    metadata:
      labels:
        app: portfolio-web
    spec:
      containers:
        - name: portfolio-web
          image: 192.168.1.10:30500/portfolio-web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  strategy:
    blueGreen:
      activeService: portfolio-web-active
      previewService: portfolio-web-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
      prePromotionAnalysis:
        templates:
          - templateName: portfolio-rollout-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-web-active
  namespace: portfolio
spec:
  selector:
    app: portfolio-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-web-preview
  namespace: portfolio
spec:
  selector:
    app: portfolio-web
  ports:
    - name: http
      port: 80
      targetPort: 80
