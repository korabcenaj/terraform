---
# ===========================================================================
# Playbook: node-update.yml
# Apply system updates and restart services that need it.
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/node-update.yml
#   ansible-playbook -i inventory/hosts.yml playbooks/node-update.yml --limit k8s-master
# ===========================================================================

- name: Update all Kubernetes nodes
  hosts: k8s_cluster
  gather_facts: true
  serial: 1
  any_errors_fatal: true

  pre_tasks:
    - name: Drain node before updates (if part of cluster)
      ansible.builtin.shell:
        cmd: |
          kubectl drain {{ inventory_hostname }} \
            --ignore-daemonsets \
            --delete-emptydir-data \
            --grace-period=60 \
            --timeout=5m || true
      delegate_to: k8s-master
      changed_when: false
      when: node_role != "control-plane"

    - name: Cordon node
      ansible.builtin.shell:
        cmd: kubectl cordon {{ inventory_hostname }} || true
      delegate_to: k8s-master
      changed_when: false

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      notify: Check reboot required

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot node if required
      ansible.builtin.reboot:
        msg: "Rebooting after system updates"
        reboot_timeout: 600
        pre_reboot_delay: 10
      when: reboot_required.stat.exists

    - name: Wait for node to come back
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        timeout: 300

  post_tasks:
    - name: Uncordon node
      ansible.builtin.shell:
        cmd: kubectl uncordon {{ inventory_hostname }} || true
      delegate_to: k8s-master
      changed_when: false

    - name: Wait for node to be ready
      ansible.builtin.shell:
        cmd: |
          kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s
      delegate_to: k8s-master
      changed_when: false
      register: node_ready
      until: node_ready.rc == 0
      retries: 12
      delay: 10

    - name: Update complete
      ansible.builtin.debug:
        msg: "✅ {{ inventory_hostname }} updated and ready."
