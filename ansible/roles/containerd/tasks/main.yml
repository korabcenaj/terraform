---
# ===========================================================================
# Role: containerd — Container runtime installation and configuration
# ===========================================================================

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    update_cache: true

- name: Install containerd
  ansible.builtin.apt:
    name: containerd.io
    state: present
    install_recommends: false

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.command:
    cmd: containerd config default
  register: containerd_config
  changed_when: false

- name: Write containerd config with optimisations
  ansible.builtin.copy:
    content: >-
      {{ containerd_config.stdout
         | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true')
         | regex_replace('snapshot_threshold = 0\n', 'snapshot_threshold = 80\n')
         | regex_replace('discard_unpacked_layers = false', 'discard_unpacked_layers = true')
      }}
    dest: /etc/containerd/config.toml
    mode: "0644"
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true
