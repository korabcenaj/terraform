---
# ===========================================================================
# Role: nvidia — NVIDIA GPU driver and container toolkit
# ===========================================================================

- name: Add NVIDIA CUDA APT key
  ansible.builtin.apt_key:
    url: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/x86_64/3bf863cc.pub
    state: present

- name: Add NVIDIA CUDA APT repository
  ansible.builtin.apt_repository:
    repo: "deb https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/x86_64 /"
    state: present
    update_cache: true

- name: Install NVIDIA driver
  ansible.builtin.apt:
    name:
      - nvidia-driver-550
      - nvidia-utils-550
    state: present
    install_recommends: false
  notify: Reboot node for NVIDIA driver

- name: Add NVIDIA Container Toolkit GPG key
  ansible.builtin.apt_key:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    state: present

- name: Add NVIDIA Container Toolkit APT repository
  ansible.builtin.apt_repository:
    repo: "deb https://nvidia.github.io/libnvidia-container/stable/ubuntu22.04/$(ARCH) /"
    state: present
    update_cache: true

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present

- name: Configure containerd for NVIDIA runtime
  ansible.builtin.command:
    cmd: nvidia-ctk runtime configure --runtime=containerd
  changed_when: true
  notify: Restart containerd
