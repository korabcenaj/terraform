name: Terraform CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Init
        run: terraform init -backend=false -input=false

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkov (report-only)
        run: |
          python -m pip install --upgrade pip
          pip install checkov
          checkov -d . --framework terraform --soft-fail

      - name: Setup kubeconform
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION="0.6.7"
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Validate Kubernetes manifests
        run: |
          set -euo pipefail
          files=$(find . -maxdepth 1 -type f \( -name "*.yaml" -o -name "*.yml" \) | tr '\n' ' ')
          if [[ -z "${files// }" ]]; then
            echo "No root-level Kubernetes manifests found."
            exit 0
          fi
          kubeconform -strict -ignore-missing-schemas ${files}
