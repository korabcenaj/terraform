name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional pull request number to comment plan summary on"
        required: false
        type: string
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: true

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-plan:
    runs-on:
      - self-hosted
      - linux
    env:
      IS_DRIFT_RUN: ${{ github.event_name == 'schedule' }}
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require kubeconfig secret
        run: |
          if [[ -z "${{ secrets.KUBECONFIG_B64 }}" ]]; then
            echo "KUBECONFIG_B64 is required for the manual Terraform plan workflow."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster reachability
        run: |
          if ! kubectl --request-timeout=10s get --raw=/readyz >/dev/null 2>&1; then
            echo "Kubernetes API is not reachable from this runner using the provided kubeconfig."
            echo "For homelab clusters, use a self-hosted runner or a kubeconfig whose server endpoint is reachable from the runner."
            exit 1
          fi

      - name: Ensure plan has state context
        run: |
          if [[ -f terraform.tfstate ]]; then
            echo "Using checked-in local Terraform state."
            exit 0
          fi

          if grep -REq '^[[:space:]]*backend[[:space:]]+"' -- *.tf; then
            echo "Backend configuration detected in Terraform configuration."
            exit 0
          fi

          if [[ -f backend.tf.example ]]; then
            echo "No terraform.tfstate file is present and remote backend is not enabled."
            echo "Tip: copy backend.tf.example to backend.tf and provide backend-config values."
            exit 1
          fi

          echo "No terraform.tfstate file is present in the repository checkout and no backend is enabled in Terraform files."
          echo "Refusing to run terraform plan from an empty state because that would be misleading."
          exit 1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan (with drift detection)
        run: |
          set +e
          terraform plan -input=false -lock-timeout=5m -detailed-exitcode -no-color -out=tfplan
          plan_exit_code=$?
          set -e

          case "${plan_exit_code}" in
            0)
              echo "No Terraform changes detected."
              ;;
            1)
              echo "Terraform plan failed."
              exit 1
              ;;
            2)
              if [[ "${IS_DRIFT_RUN}" == "true" ]]; then
                echo "Drift detected during scheduled run."
                exit 1
              fi
              echo "Terraform plan contains changes."
              ;;
            *)
              echo "Unexpected terraform plan exit code: ${plan_exit_code}"
              exit 1
              ;;
          esac

      - name: Terraform Plan Summary
        id: plan_summary
        if: always()
        run: |
          if [[ -f tfplan ]]; then
            terraform show -no-color tfplan > tfplan.txt
            echo "Terraform plan summary:"
            plan_line=$(grep -E "^Plan:" tfplan.txt | head -n1 || true)
            grep -E "^Plan:" tfplan.txt || true
            echo "plan_line=${plan_line}" >> "$GITHUB_OUTPUT"

            {
              echo "## Terraform Plan"
              echo
              if [[ -n "${plan_line}" ]]; then
                echo "${plan_line}"
              else
                echo "Plan line not found in terraform show output."
              fi
              echo
              if [[ "${IS_DRIFT_RUN}" == "true" ]]; then
                echo "Run type: scheduled drift detection"
              else
                echo "Run type: manual"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No tfplan output generated."
            echo "plan_line=No tfplan output generated." >> "$GITHUB_OUTPUT"

            {
              echo "## Terraform Plan"
              echo
              echo "No tfplan output generated."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload plan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: |
            tfplan
            tfplan.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment plan summary on PR
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ github.event.inputs.pr_number }}');
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed('Invalid pr_number input. Provide a positive integer.');
              return;
            }

            const planLine = `${{ steps.plan_summary.outputs.plan_line }}` || 'Plan summary not available.';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Terraform plan summary from manual workflow run:',
              '',
              `- ${planLine}`,
              `- Workflow run: ${runUrl}`,
              '',
              'Artifacts include `tfplan` and `tfplan.txt` when generated.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });